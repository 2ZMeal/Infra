server:
  port: 19089

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:postgresql://postgres:5432/review_db
    username: review_user
    password: ${REVIEW_DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: review-group
      auto-offset-reset: earliest
