server:
  port: 19087

spring:
  application:
    name: shipment-service
  datasource:
    url: jdbc:postgresql://postgres:5432/shipment_db
    username: shipment_user
    password: ${SHIPMENT_DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: shipment-group
      auto-offset-reset: earliest
