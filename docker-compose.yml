services:

  # ── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    profiles: [infra]
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ezmeal-net


  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7
    container_name: redis
    profiles: [infra]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ezmeal-net

  # ── Zookeeper ───────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    profiles: [infra]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ezmeal-net

  # ── Kafka ────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    profiles: [infra]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ezmeal-net

  # -- Kafka UI ----------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    profiles: [ infra ]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9001:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - ezmeal-net

  # ── Kafdrop (Kafka UI) ───────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    profiles: [infra]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    networks:
      - ezmeal-net

  # ── Keycloak ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    profiles: [infra]
    command: start-dev
    env_file: .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ezmeal-net

  # -- Elasticsearch -----------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: elasticsearch
    profiles: [infra]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ezmeal-net

  # -- Kibana ------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: kibana
    profiles: [infra]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ezmeal-net

  # ── Config Server ────────────────────────────────────
  config-server:
    environment:
      SPRING_PROFILES_ACTIVE: native,dev
    build:
      context: ../Config_server
      dockerfile: Dockerfile
    image: easymeal/config-server:latest
    container_name: config-server
    profiles: [platform]
    env_file: .env
    ports:
      - "8888:8888"
    volumes:
      - ./config:/config
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ezmeal-net

  # ── Eureka Server ─────────────────────────────────────
  eureka-server:
    build:
      context: ../Eureka_Server
      dockerfile: Dockerfile
    image: easymeal/eureka-server:latest
    container_name: eureka-server
    profiles: [platform]
    environment:
      EUREKA_HOSTNAME: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ezmeal-net

  # ── API Gateway ───────────────────────────────────────
  api-gateway:
    build:
      context: ../Gateway_server
      dockerfile: Dockerfile
    image: easymeal/api-gateway:latest
    container_name: api-gateway
    profiles: [platform]
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ezmeal-net

  # ── Domain Services (app profile) ────────────────────
  user-service:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URI: http://config-server:8888
    build:
      context: ../User_server
      dockerfile: Dockerfile
      args:
        GPR_USER: ${GPR_USER}
        GPR_TOKEN: ${GPR_TOKEN}
    image: easymeal/user-service:latest
    container_name: user-service
    profiles: [app]
    env_file: .env
    ports:
      - "19081:19081"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ezmeal-net

  company-service:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URI: http://config-server:8888
    build:
      context: ../Company_server
      dockerfile: Dockerfile
      args:
        GPR_USER: ${GPR_USER}
        GPR_TOKEN: ${GPR_TOKEN}
    image: easymeal/company-service:latest
    container_name: company-service
    profiles: [app]
    env_file: .env
    ports:
      - "19082:19082"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ezmeal-net

  product-service:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URI: http://config-server:8888
      PRODUCT_ELASTICSEARCH_URIS: http://elasticsearch:9200
    build:
      context: ../Product_server
      dockerfile: Dockerfile
      args:
        GPR_USER: ${GPR_USER}
        GPR_TOKEN: ${GPR_TOKEN}
    image: easymeal/product-service:latest
    container_name: product-service
    profiles: [ app ]
    env_file: .env
    ports:
      - "19083:19083"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - ezmeal-net

