  # ── Prometheus ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus-prod.yml:/etc/prometheus/prometheus-prod.yml
    networks:
      - ezmeal-net

  # ── Grafana ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - ezmeal-net

  # ── Zipkin ────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    profiles: [monitoring]
    ports:
      - "9411:9411"
    networks:
      - ezmeal-net

volumes:
  postgres_data:
  elasticsearch_data:

networks:
  ezmeal-net:
    driver: bridge
